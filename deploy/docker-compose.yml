name: agentpilot

services:
  agentpilot-postgres:
    image: pgvector/pgvector:pg16
    container_name: agentpilot-postgres
    environment:
      POSTGRES_DB: agentpilot
      POSTGRES_USER: agentpilot
      POSTGRES_PASSWORD: agentpilot
    ports:
      - "15432:5432"
    volumes:
      - agentpilot-postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentpilot -d agentpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  agentpilot-redis:
    image: redis:7-alpine
    container_name: agentpilot-redis
    ports:
      - "16379:6379"
    volumes:
      - agentpilot-redis-data:/data

  agentpilot-minio:
    image: minio/minio:RELEASE.2024-03-30T09-41-56Z
    container_name: agentpilot-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: agentpilot
      MINIO_ROOT_PASSWORD: agentpilot123
    ports:
      - "29000:9000"
      - "29001:9001"
    volumes:
      - agentpilot-minio-data:/data

  agentpilot-backend:
    container_name: agentpilot-backend
    build:
      context: ../backend
    env_file:
      - ../.env
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-agentpilot-encryption-key-change-in-production}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - LOGIN_RATE_LIMIT=${LOGIN_RATE_LIMIT:-5/minute}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    depends_on:
      agentpilot-postgres:
        condition: service_healthy
      agentpilot-redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  agentpilot-frontend:
    container_name: agentpilot-frontend
    build:
      context: ../frontend
    ports:
      - "5173:80"
    depends_on:
      - agentpilot-backend

volumes:
  agentpilot-postgres-data:
    name: agentpilot-postgres-data
  agentpilot-redis-data:
    name: agentpilot-redis-data
  agentpilot-minio-data:
    name: agentpilot-minio-data
